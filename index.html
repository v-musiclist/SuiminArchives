<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="pageTitle"></title>
  <link rel="icon" href="./assets/siteicon.png" type="image/png" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div display="flex">
    <div>
      <header class="topbar">
    <div class="brand">
      <div class="brand__title" id="siteTitle"></div>
      <div class="brand__sub" id="siteSub"></div>
    </div>

  <div class="actions">
    <!-- SNS（PC表示用） -->
    <div class="social">
      <a class="sns-img-btn twitterBtn" id="twitterLink" target="_blank" rel="noopener">
      	<img src="./assets/twitter.png" alt="Twitter" width="80" height="40" />
      </a>
      <a class="sns-img-btn youtubeBtn" id="youtubeLink" target="_blank" rel="noopener">
      	<img src="./assets/youtube.png" alt="YouTube" width="80" height="40" />
      </a>
      <a class="sns-img-btn otherBtn" id="otherLink" target="_blank" rel="noopener">
      	<img src="./assets/others.png" alt="Others" width="80" height="40" />
      </a>
    </div>

    <!-- ハンバーガー（スマホ用） -->
    <button class="nav-toggle" id="navToggle"
      aria-label="menu" aria-expanded="false">☰</button>
  </div>
    </div>

    <div>
      <!-- タブナビゲーション -->
      <nav class="tabs">
        <button class="tab active" data-tab="home" aria-label="ホームタブ">ホーム</button>
        <button class="tab" data-tab="live" aria-label="ライブタブ">ライブ</button>
        <button class="tab" data-tab="music" aria-label="曲一覧タブ">曲一覧</button>
        <button class="tab" data-tab="contact" aria-label="お問い合わせタブ">お問い合わせ</button>
      </nav>
    </div>
  </div>
  </header>

  <!-- スマホ用メニュー（SNS＋タブ） -->
  <div class="navpanel" id="navPanel" aria-hidden="true">
    <div class="navpanel__backdrop" id="navBackdrop"></div>

    <div class="navpanel__inner">
      <div class="navpanel__title">メニュー</div>

      <!-- SNS（ハンバーガーの中） -->
      <div class="navpanel__group">
        <a class="sns-img-btn twitterBtn" target="_blank" rel="noopener">
        	<img src="./assets/twitter.png" alt="Twitter" width="80" height="40" />
        </a>
        <a class="sns-img-btn youtubeBtn" target="_blank" rel="noopener">
        	<img src="./assets/youtube.png" alt="YouTube" width="80" height="40" />
        </a>
        <a class="sns-img-btn otherBtn" target="_blank" rel="noopener">
        	<img src="./assets/others.png" alt="Others" width="80" height="40" />
        </a>
      </div>

      <div class="ruleline"></div>

      <!-- タブ（スマホではこれを使う） -->
      <div class="navpanel__grid">
        <button class="tab tab--mobile" data-tab="home">ホーム</button>
        <button class="tab tab--mobile" data-tab="live">ライブ</button>
        <button class="tab tab--mobile" data-tab="music">曲一覧</button>
        <button class="tab tab--mobile" data-tab="contact">お問い合わせ</button>
      </div>
    </div>
  </div>

  <main class="container">
    <!-- ホームタブ -->
    <section class="page active" data-page="home" id="homePage">
      <div class="card">
        <div class="card__head">
          <h2>ホーム</h2>
        </div>
        <div id="homeFeatured" class="home-feature" aria-live="polite"></div>
      </div>
    </section>

    <!-- ライブタブ -->
    <section class="page" data-page="live" id="livePage">
      <section class="card live-panel">
        <div class="card__head">
          <h2>ライブ情報一覧</h2>
          <p class="muted" id="liveUpdateNote"></p>
        </div>
        <div id="liveList" class="live-list" aria-live="polite">読み込み中...</div>
      </section>
    </section>

    <!-- 曲一覧タブ -->
    <section class="page" data-page="music" id="musicPage">
      <div class="card">
        <div class="card__head">
          <h2>曲一覧</h2>
          <p class="muted" id="musicUpdateNote"></p>
        </div>
        <form class="song-search" id="songSearchForm">
          <input class="song-search__input" id="songSearchInput" type="text" placeholder="曲名を入力" aria-label="曲名検索" />
          <button class="song-search__button" type="submit">検索</button>
        </form>
        <div id="songList" class="song-list" aria-live="polite">読み込み中...</div>
      </div>
    </section>

    <!-- お問い合わせタブ -->
    <section class="page" data-page="contact" id="contactPage">
      <div class="card">
        <div class="card__head">
          <h2>お問い合わせ</h2>
        </div>
        <div class="contact-panel">
          <p class="contact-panel__intro">質問や、不具合のお問い合わせなどはこちらまで</p>
          <div class="contact-panel__actions">
            <div class="contact-panel__user">@A_F_ST</div>
            <a class="contact-panel__button" href="https://x.com/A_F_ST" target="_blank" rel="noopener" aria-label="Twitterで問い合わせる">
              <img src="./assets/twitter.png" alt="Twitter" />
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="live-subpanel" id="liveSubpanel" aria-hidden="true">
    <div class="live-subpanel__backdrop" id="liveSubpanelBackdrop"></div>
    <div class="live-subpanel__panel" role="dialog" aria-modal="true" aria-labelledby="liveSubpanelTitle">
      <button class="live-subpanel__close" id="liveSubpanelClose" type="button" aria-label="サブパネルを閉じる">×</button>
      <div class="live-subpanel__content" id="liveSubpanelContent"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
