<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Suimin Archives | 酔眠はやね曲リスト</title>
  <link rel="icon" href="./assets/siteicon.png" type="image/png" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand__title" id="siteTitle"></div>
      <div class="brand__sub" id="siteSub"></div>
    </div>

  <div class="actions">
    <!-- SNS（PC表示用） -->
    <div class="social">
      <a class="sns-img-btn" href="https://x.com/SuiminHayane" target="_blank" rel="noopener">
      	<img src="./assets/twitter.png" alt="Twitter" width="80" height="40" />
      </a>
      <a class="sns-img-btn" href="https://www.youtube.com/@SuiminHayane" target="_blank" rel="noopener">
      	<img src="./assets/youTube.png" alt="YouTube" width="80" height="40" />
      </a>
      <a class="sns-img-btn" href="https://lit.link/SuiminHayane" target="_blank" rel="noopener">
      	<img src="./assets/litlink.png" alt="LitLink" width="80" height="40" />
      </a>
    </div>

    <!-- ハンバーガー（スマホ用） -->
    <button class="nav-toggle" id="navToggle"
      aria-label="menu" aria-expanded="false">☰</button>
  </div>

  </header>

  <!-- スマホ用メニュー（SNS＋タブ） -->
  <div class="navpanel" id="navPanel" aria-hidden="true">
    <div class="navpanel__backdrop" id="navBackdrop"></div>

    <div class="navpanel__inner">
      <div class="navpanel__title">メニュー</div>

      <!-- SNS（ハンバーガーの中） -->
      <div class="navpanel__group">
        <a class="sns-img-btn" href="https://x.com/SuiminHayane" target="_blank" rel="noopener">
        	<img src="./assets/twitter.png" alt="Twitter" width="80" height="40" />
        </a>
        <a class="sns-img-btn" href="https://www.youtube.com/@SuiminHayane" target="_blank" rel="noopener">
        	<img src="./assets/youTube.png" alt="YouTube" width="80" height="40" />
        </a>
        <a class="sns-img-btn" href="https://lit.link/SuiminHayane" target="_blank" rel="noopener">
        	<img src="./assets/litlink.png" alt="LitLink" width="80" height="40" />
        </a>
      </div>

      <div class="ruleline"></div>

      <!-- タブ（スマホではこれを使う） -->
      <div class="navpanel__grid">
        <a href="#home" class="tab tab--mobile" data-tab="home"></a>
        <a href="#about" class="tab tab--mobile" data-tab="about"></a>
        <a href="#support" class="tab tab--mobile" data-tab="support"></a>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
